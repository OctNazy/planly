{% extends "base.html" %}

{% block content %}
<section class="form-card">
    <h2>Log in</h2>
    <p class="muted">Open your calendar and manage your plans.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
</section>

<p class="bottom-text">
    No account yet?
    <a href="{% url 'register' %}">Create one</a>
</p>
{% endblock %}
