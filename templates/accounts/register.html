{% extends "base.html" %}

{% block content %}
<section class="form-card">
    <h2>Create account</h2>
    <p class="muted">Plans and reminders stay tied to your account.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create account</button>
    </form>
</section>

<p class="bottom-text">
    Already have an account?
    <a href="{% url 'login' %}">Log in</a>
</p>
{% endblock %}
