{% extends "base.html" %}

{% block content %}
<section class="screen-top">
    {% if event %}
        <h2>Edit event</h2>
    {% else %}
        <h2>New event</h2>
    {% endif %}

    <details class="info-popover">
        <summary aria-label="Event info">i</summary>
        <p>Events are plans with a start time and optional end time.</p>
    </details>
</section>

<section class="form-card">
    {% if not event %}
        <div class="create-tabs">
            <span class="active">Event</span>
            <a href="{% url 'reminder_create' %}">Reminder</a>
        </div>
    {% endif %}

    <form method="post" class="plan-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save event</button>
    </form>
</section>

<p class="bottom-text">
    <a href="{% url 'event_list' %}">Back to plans</a>
</p>
{% endblock %}
