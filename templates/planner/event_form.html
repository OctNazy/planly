{% extends "base.html" %}

{% block content %}
<section class="form-card">
    {% if not event %}
        <div class="create-tabs">
            <span class="active">Event</span>
            <a href="{% url 'reminder_create' %}">Reminder</a>
        </div>
    {% endif %}

    <div class="form-head">
        {% if event %}
            <p class="eyebrow">event</p>
            <h2>Edit event</h2>
        {% else %}
            <p class="eyebrow">event</p>
            <h2>New event</h2>
        {% endif %}
        <p class="muted">Use events for plans with a start time and optional end time.</p>
    </div>

    <form method="post" class="plan-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save event</button>
    </form>
</section>

<p class="bottom-text">
    <a href="{% url 'event_list' %}">Back to plans</a>
</p>
{% endblock %}
