{% extends "base.html" %}

{% block content %}
<section class="screen-top screen-top-back">
    {% include "planner/partials/back_button.html" with fallback_url="event_detail" fallback_pk=event.pk %}
    <h2>Delete event</h2>
</section>

<section class="form-card">
    <p>Are you sure you want to delete <strong>{{ event.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="danger-button">Delete</button>
        <a href="{% url 'event_detail' event.pk %}">Cancel</a>
    </form>
</section>
{% endblock %}
