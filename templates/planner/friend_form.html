{% extends "base.html" %}

{% block content %}
<section class="screen-top screen-top-back">
    {% include "planner/partials/back_button.html" with fallback_url="friends" %}
    <h2>Add friend</h2>
</section>

<section class="form-card">
    <form method="post" action="{% url 'friend_request_create' %}" class="plan-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send request</button>
    </form>
</section>

{% endblock %}
