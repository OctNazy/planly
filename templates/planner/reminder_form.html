{% extends "base.html" %}

{% block content %}
<section class="form-card">
    <div class="create-tabs">
        <a href="{% url 'event_create' %}">Event</a>
        <span class="active">Reminder</span>
    </div>

    <div class="form-head">
        <p class="eyebrow">reminder</p>
        <h2>New reminder</h2>
        <p class="muted">Reminders are private. Use them for birthdays, calls, payments, or small tasks.</p>
    </div>

    <form method="post" class="plan-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save reminder</button>
    </form>
</section>

<p class="bottom-text">
    <a href="{% url 'event_list' %}">Back to plans</a>
</p>
{% endblock %}
