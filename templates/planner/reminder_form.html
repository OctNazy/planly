{% extends "base.html" %}

{% block content %}
<section class="form-card">
    <div class="create-tabs">
        <a href="{% url 'event_create' %}" class="{% if active_tab == 'event' %}active{% endif %}">Event</a>
        <a href="{% url 'reminder_create' %}" class="{% if active_tab == 'reminder' %}active{% endif %}">Reminder</a>
    </div>

    <h2>New reminder</h2>
    <p class="muted">Reminders are always private. Use them for birthdays, calls, payments, or small tasks.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save reminder</button>
    </form>
</section>

<p class="bottom-text">
    <a href="{% url 'event_list' %}">Back to plans</a>
</p>
{% endblock %}
